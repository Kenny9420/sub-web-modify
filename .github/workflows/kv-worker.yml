name: Deploy KV Short Link Worker

on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
  workflow_dispatch:    

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package.json

            - name: Deploy Worker
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_EMAIL: ${{ secrets.CF_API_EMAIL }}
        run: npx wrangler deploy
        working-directory: worker
